apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: temporal-operator
        control-plane: controller-manager
    name: temporal-operator-controller-manager
    namespace: {{ .Release.Namespace }}
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: temporal-operator
            control-plane: controller-manager
    template:
        metadata:
            annotations:
                kubectl.kubernetes.io/default-container: manager
            labels:
                app.kubernetes.io/name: temporal-operator
                control-plane: controller-manager
                {{- if .Values.workloadIdentity.enable }}
                azure.workload.identity/use: "true"
                {{- end }}
        spec:
            containers:
                - args:
                    {{- if .Values.metrics.enable }}
                    - --metrics-bind-address=:{{ .Values.metrics.port }}
                    {{- else }}
                    # Bind to :0 to disable the controller-runtime managed metrics server
                    - --metrics-bind-address=0
                    {{- end }}
                    - --health-probe-bind-address=:8081
                    {{- range .Values.manager.args }}
                    - {{ . }}
                    {{- end }}
                    {{- if .Values.certManager.enable }}
                    - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
                    {{- end }}
                  command:
                    - /manager
                  image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag | default .Chart.AppVersion }}"
                  imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
                  livenessProbe:
                    httpGet:
                        path: /healthz
                        port: 8081
                    initialDelaySeconds: 15
                    periodSeconds: 20
                  name: manager
                  ports:
                    - containerPort: {{ .Values.webhook.port }}
                      name: webhook-server
                      protocol: TCP
                  readinessProbe:
                    httpGet:
                        path: /readyz
                        port: 8081
                    initialDelaySeconds: 5
                    periodSeconds: 10
                  resources:
                    {{- if .Values.manager.resources }}
                    {{- toYaml .Values.manager.resources | nindent 20 }}
                    {{- else }}
                    {}
                    {{- end }}
                  securityContext:
                    {{- if .Values.manager.securityContext }}
                    {{- toYaml .Values.manager.securityContext | nindent 20 }}
                    {{- else }}
                    {}
                    {{- end }}
                  volumeMounts:
                    {{- if .Values.certManager.enable }}
                    - mountPath: /tmp/k8s-webhook-server/serving-certs
                      name: webhook-certs
                      readOnly: true
                    {{- end }}
                    {{- if .Values.workloadIdentity.enable }}
                    - name: azure-token
                      mountPath: {{ dir .Values.workloadIdentity.tokenSidecar.tokenPath }}
                    {{- end }}
                {{- if .Values.workloadIdentity.enable }}
                - name: azure-token-refresher
                  image: {{ .Values.workloadIdentity.tokenSidecar.image }}
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      set -e
                      export HOME={{ dir .Values.workloadIdentity.tokenSidecar.tokenPath }}
                      export AZURE_CONFIG_DIR={{ dir .Values.workloadIdentity.tokenSidecar.tokenPath }}/.azure
                      az login --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                        --service-principal -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" >/dev/null
                      while true; do
                        if az account get-access-token --resource-type oss-rdbms \
                            --query accessToken -o tsv > {{ .Values.workloadIdentity.tokenSidecar.tokenPath }}.tmp 2>/dev/null; then
                          mv {{ .Values.workloadIdentity.tokenSidecar.tokenPath }}.tmp {{ .Values.workloadIdentity.tokenSidecar.tokenPath }}
                        else
                          echo "azure token refresh failed; retrying" >&2
                          rm -f {{ .Values.workloadIdentity.tokenSidecar.tokenPath }}.tmp
                        fi
                        sleep {{ .Values.workloadIdentity.tokenSidecar.refreshSeconds }}
                      done
                  securityContext:
                    runAsNonRoot: true
                    runAsUser: {{ .Values.workloadIdentity.tokenSidecar.runAsUser }}
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: false
                    capabilities:
                      drop:
                        - ALL
                  resources:
                    {{- toYaml .Values.workloadIdentity.tokenSidecar.resources | nindent 20 }}
                  volumeMounts:
                    - name: azure-token
                      mountPath: {{ dir .Values.workloadIdentity.tokenSidecar.tokenPath }}
                {{- end }}
            securityContext:
              {{- if .Values.manager.podSecurityContext }}
              {{- toYaml .Values.manager.podSecurityContext | nindent 14 }}
              {{- else }}
              {}
              {{- end }}
            serviceAccountName: temporal-operator-controller-manager
            terminationGracePeriodSeconds: 10
            volumes:
                {{- if .Values.certManager.enable }}
                - name: webhook-certs
                  secret:
                    secretName: webhook-server-cert
                {{- end }}
                {{- if .Values.workloadIdentity.enable }}
                - name: azure-token
                  emptyDir: {}
                {{- end }}
