apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
    annotations:
        {{- if .Values.certManager.enable }}
        cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/temporal-operator-serving-cert
        {{- end }}
    name: temporal-operator-validating-webhook-configuration
webhooks:
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: temporal-operator-webhook-service
            namespace: {{ .Release.Namespace }}
            path: /validate-temporal-bmor10-com-v1alpha1-temporalcluster
      failurePolicy: Fail
      name: vtemporalcluster-v1alpha1.kb.io
      rules:
        - apiGroups:
            - temporal.bmor10.com
          apiVersions:
            - v1alpha1
          operations:
            - CREATE
            - UPDATE
            - DELETE
          resources:
            - temporalclusters
      sideEffects: None
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: temporal-operator-webhook-service
            namespace: {{ .Release.Namespace }}
            path: /validate-temporal-bmor10-com-v1alpha1-temporalnamespace
      failurePolicy: Fail
      name: vtemporalnamespace-v1alpha1.kb.io
      rules:
        - apiGroups:
            - temporal.bmor10.com
          apiVersions:
            - v1alpha1
          operations:
            - CREATE
            - UPDATE
          resources:
            - temporalnamespaces
      sideEffects: None
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: temporal-operator-webhook-service
            namespace: {{ .Release.Namespace }}
            path: /validate-temporal-bmor10-com-v1alpha1-temporalschedule
      failurePolicy: Fail
      name: vtemporalschedule-v1alpha1.kb.io
      rules:
        - apiGroups:
            - temporal.bmor10.com
          apiVersions:
            - v1alpha1
          operations:
            - CREATE
            - UPDATE
          resources:
            - temporalschedules
      sideEffects: None
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: temporal-operator-webhook-service
            namespace: {{ .Release.Namespace }}
            path: /validate-temporal-bmor10-com-v1alpha1-temporalsearchattribute
      failurePolicy: Fail
      name: vtemporalsearchattribute-v1alpha1.kb.io
      rules:
        - apiGroups:
            - temporal.bmor10.com
          apiVersions:
            - v1alpha1
          operations:
            - CREATE
            - UPDATE
          resources:
            - temporalsearchattributes
      sideEffects: None
