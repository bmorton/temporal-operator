apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
    annotations:
        {{- if .Values.certManager.enable }}
        cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/temporal-operator-serving-cert
        {{- end }}
    name: temporal-operator-mutating-webhook-configuration
webhooks:
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: temporal-operator-webhook-service
            namespace: {{ .Release.Namespace }}
            path: /mutate-temporal-bmor10-com-v1alpha1-temporalcluster
      failurePolicy: Fail
      name: mtemporalcluster-v1alpha1.kb.io
      rules:
        - apiGroups:
            - temporal.bmor10.com
          apiVersions:
            - v1alpha1
          operations:
            - CREATE
            - UPDATE
          resources:
            - temporalclusters
      sideEffects: None
