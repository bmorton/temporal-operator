{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: temporal-operator
    name: temporal-operator-temporaldevserver-admin-role
rules:
    - apiGroups:
        - temporal.bmor10.com
      resources:
        - temporaldevservers
      verbs:
        - '*'
    - apiGroups:
        - temporal.bmor10.com
      resources:
        - temporaldevservers/status
      verbs:
        - get
{{- end }}
