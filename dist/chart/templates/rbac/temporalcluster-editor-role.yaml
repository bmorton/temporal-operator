{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: temporal-operator
    name: temporal-operator-temporalcluster-editor-role
rules:
    - apiGroups:
        - temporal.bmor10.com
      resources:
        - temporalclusters
      verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch
    - apiGroups:
        - temporal.bmor10.com
      resources:
        - temporalclusters/status
      verbs:
        - get
{{- end }}
