                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              description:
                description: Description is a human-friendly description of the namespace.
                type: string
              driftDetection:
                default: reconcile
                description: |-
                  DriftDetection controls whether the operator reconciles drift between the
                  spec and the live namespace.
                enum:
                - reconcile
                - ignore
                type: string
              ownerEmail:
                description: OwnerEmail is the owner contact for the namespace.
                type: string
              retentionPeriod:
                default: 72h
                description: RetentionPeriod is how long closed workflows are retained.
                type: string
            required:
