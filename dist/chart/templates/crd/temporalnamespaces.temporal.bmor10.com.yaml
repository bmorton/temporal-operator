                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastUpdated:
                description: LastUpdated is when the operator last reconciled the
                  namespace.
                format: date-time
                type: string
              namespaceID:
                description: NamespaceID is the Temporal-assigned namespace UUID.
                type: string
              observedGeneration:
                format: int64
                type: integer
              registered:
                description: Registered indicates whether the namespace exists in
