    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.19.0
  name: temporalnamespaces.temporal.bmor10.com
spec:
  group: temporal.bmor10.com
  names:
    kind: TemporalNamespace
    listKind: TemporalNamespaceList
    plural: temporalnamespaces
    shortNames:
    - tns
    singular: temporalnamespace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .spec.retentionPeriod
      name: Retention
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TemporalNamespace is the Schema for the temporalnamespaces API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of TemporalNamespace
            properties:
              allowDeletion:
                description: |-
                  AllowDeletion permits the operator to delete the Temporal namespace when
                  the CR is deleted. When false, the namespace is left in place.
                type: boolean
              clusterRef:
                description: ClusterRef references the TemporalCluster that owns this
                  namespace.
                properties:
                  name:
                    default: ""
