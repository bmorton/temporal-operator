---
# authz-allow: valid JWT → frontend must accept the request (exit 0).
apiVersion: batch/v1
kind: Job
metadata:
  name: authz-allow
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: check
          image: temporalio/admin-tools:1.31.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              TOKEN=$(cat /tokens/token-valid.txt | tr -d '\n')
              temporal operator namespace list \
                --address temporal-authz-frontend:7233 \
                --grpc-meta "authorization=Bearer ${TOKEN}"
          volumeMounts:
            - name: tokens
              mountPath: /tokens
              readOnly: true
      volumes:
        - name: tokens
          configMap:
            name: e2e-tokens
