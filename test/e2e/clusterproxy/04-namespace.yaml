# A GLOBAL namespace created against cluster-a as the active cluster. Because
# the proxy mux link is live, registering on cluster-a causes Temporal to
# propagate the namespace to cluster-b through the mux tunnel.
apiVersion: temporal.bmor10.com/v1alpha1
kind: TemporalNamespace
metadata:
  name: orders
spec:
  clusterRef:
    name: temporal-cluster-a
  retentionPeriod: "24h"
  description: "Global orders namespace for clusterproxy e2e"
  ownerEmail: "team@example.com"
  isGlobal: true
  clusters: [clusterA, clusterB]
  activeCluster: clusterA
