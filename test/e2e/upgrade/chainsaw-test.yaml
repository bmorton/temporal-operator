# Chainsaw upgrade test: bring up a cluster at 1.30.4, upgrade to 1.31.1, and
# assert the upgrade phase machine completes. Requires the CNPG operator.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: upgrade
spec:
  timeouts:
    apply: 1m
    assert: 10m
  steps:
    - name: provision-postgres
      try:
        - apply:
            file: ../postgres/01-fixtures-cnpg.yaml
        - assert:
            resource:
              apiVersion: postgresql.cnpg.io/v1
              kind: Cluster
              metadata:
                name: temporal-pg
              status:
                readyInstances: 1
        - apply:
            file: ../postgres/02-secrets.yaml
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: create-visibility-db
              status:
                succeeded: 1
    - name: deploy-old-version
      try:
        - apply:
            file: 01-temporalcluster-1.30.yaml
        - assert:
            file: 01-assert.yaml
    - name: upgrade-to-new-version
      try:
        - apply:
            file: 02-temporalcluster-1.31.yaml
        - assert:
            file: 02-assert.yaml
  # Runs on ANY step failure, before Chainsaw tears down the ephemeral
  # namespace, so the operator-managed pods/jobs/logs are still available.
  catch:
    - describe:
        apiVersion: temporal.bmor10.com/v1alpha1
        kind: TemporalCluster
    - script:
        env:
          - name: NS
            value: ($namespace)
        content: |
          set +e
          echo "===== PODS ====="
          kubectl -n "$NS" get pods -o wide
          echo "===== JOBS ====="
          kubectl -n "$NS" get jobs
          echo "===== DEPLOYMENTS ====="
          kubectl -n "$NS" get deploy
          echo "===== DESCRIBE PODS ====="
          kubectl -n "$NS" describe pods
          echo "===== EVENTS ====="
          kubectl -n "$NS" get events --sort-by=.lastTimestamp | tail -60
          echo "===== POD LOGS ====="
          for p in $(kubectl -n "$NS" get pods -o name); do
            echo "----- $p -----"
            kubectl -n "$NS" logs "$p" --all-containers --tail=100
          done
