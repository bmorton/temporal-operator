# Passwordless TemporalCluster against Azure Database for PostgreSQL Flexible
# Server. Every actor authenticates with a Microsoft Entra token (zero static
# passwords):
#   - OPERATOR probe + schema inspection: native in-process Entra token, enabled
#     by `sql.azureWorkloadIdentity: {}` on each store (the operator runs on a
#     distroless image with no shell, so it cannot run a passwordCommand).
#   - SERVER pods: azure-token-refresher sidecar writes /azure/pgpass; Temporal
#     reads it via passwordCommand on every connection.
#   - Schema Job: one-shot initContainer writes /azure/pgpass; same passwordCommand.
#
# Host, user and clientId are supplied at runtime via chainsaw --values (written
# by hack/azure-e2e.sh). The manifest itself stays generic and secret-free.
apiVersion: temporal.bmor10.com/v1alpha1
kind: TemporalCluster
metadata:
  name: azure-e2e
spec:
  version: "1.31.1"
  numHistoryShards: 512
  services:
    overrides:
      podTemplate:
        labels:
          azure.workload.identity/use: "true"
        spec:
          serviceAccountName: temporal-workload-identity
          containers:
            # Patch the generated server container (merged by name) to mount the
            # shared token volume so it can read /azure/pgpass.
            - name: temporal
              volumeMounts:
                - name: azure-token
                  mountPath: /azure
            # Sidecar refreshes an Entra access token for Flexible Server.
            - name: azure-token-refresher
              image: mcr.microsoft.com/azure-cli:2.87.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  az login --service-principal \
                    -u "$AZURE_CLIENT_ID" \
                    --tenant "$AZURE_TENANT_ID" \
                    --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                    --allow-no-subscriptions
                  while true; do
                    az account get-access-token --resource-type oss-rdbms \
                      --query accessToken -o tsv > /azure/pgpass.tmp
                    mv /azure/pgpass.tmp /azure/pgpass
                    sleep 1800
                  done
              volumeMounts:
                - name: azure-token
                  mountPath: /azure
          volumes:
            - name: azure-token
              emptyDir: {}
  persistence:
    schemaJob:
      podTemplate:
        labels:
          azure.workload.identity/use: "true"
        spec:
          serviceAccountName: temporal-workload-identity
          containers:
            # Patch the generated schema container (merged by name) to mount the
            # shared token volume so it can read /azure/pgpass.
            - name: schema
              volumeMounts:
                - name: azure-token
                  mountPath: /azure
          initContainers:
            - name: azure-token
              image: mcr.microsoft.com/azure-cli:2.87.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  az login --service-principal \
                    -u "$AZURE_CLIENT_ID" \
                    --tenant "$AZURE_TENANT_ID" \
                    --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                    --allow-no-subscriptions
                  az account get-access-token --resource-type oss-rdbms \
                    --query accessToken -o tsv > /azure/pgpass
              volumeMounts:
                - name: azure-token
                  mountPath: /azure
          volumes:
            - name: azure-token
              emptyDir: {}
    defaultStore:
      sql:
        pluginName: postgres12
        host: ($values.pgHost)
        port: 5432
        database: temporal
        user: ($values.pgUser)
        passwordCommandSecretRef:
          name: azure-pg-passwordcommand
          key: command
        # Operator authenticates its own probe/schema inspection natively.
        azureWorkloadIdentity: {}
        tls:
          enabled: true
    visibilityStore:
      sql:
        pluginName: postgres12
        host: ($values.pgHost)
        port: 5432
        database: temporal_visibility
        user: ($values.pgUser)
        passwordCommandSecretRef:
          name: azure-pg-passwordcommand
          key: command
        # Operator authenticates its own probe/schema inspection natively.
        azureWorkloadIdentity: {}
        tls:
          enabled: true
