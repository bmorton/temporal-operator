# passwordCommand consumed by the Temporal SERVER pods and the schema Job to
# obtain the Flexible Server password (a short-lived Microsoft Entra access
# token). The azure-token-refresher sidecar / token initContainer writes the
# token to /azure/pgpass; this command waits for the first token then prints it.
# The OPERATOR does not use this command: it obtains its own Entra token
# natively in-process (sql.azureWorkloadIdentity on each store).
apiVersion: v1
kind: Secret
metadata:
  name: azure-pg-passwordcommand
type: Opaque
stringData:
  command: "sh -c 'until [ -s /azure/pgpass ]; do sleep 1; done; cat /azure/pgpass'"
