# ServiceAccount federated with the Azure user-assigned managed identity. The
# Azure Workload Identity webhook uses the client-id annotation to mint Entra
# tokens for any pod that runs as this ServiceAccount and carries the
# azure.workload.identity/use: "true" label (the operator, the server pods, and
# the schema Job). The client-id is supplied at runtime via chainsaw --values.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: temporal-workload-identity
  annotations:
    azure.workload.identity/client-id: ($values.clientId)
