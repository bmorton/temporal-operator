# Creates the four databases used by the two TemporalClusters. CNPG's initdb only
# creates the bootstrap "temporal" database, so this one-shot Job connects with
# the application user (which was granted CREATEDB) and creates the rest if they
# do not already exist. Mirrors ../postgres/02-secrets.yaml but for two clusters.
apiVersion: batch/v1
kind: Job
metadata:
  name: create-databases
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: createdbs
          image: postgres:16
          command: ["/bin/sh", "-c"]
          args:
            - >-
              until pg_isready -h temporal-pg-rw -U temporal; do sleep 2; done;
              for db in temporal_a temporal_a_visibility temporal_b temporal_b_visibility; do
                psql -h temporal-pg-rw -U temporal -d temporal -tc
                "SELECT 1 FROM pg_database WHERE datname = '$db'"
                | grep -q 1 ||
                psql -h temporal-pg-rw -U temporal -d temporal -c
                "CREATE DATABASE $db OWNER temporal;";
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-pg-app
                  key: password
