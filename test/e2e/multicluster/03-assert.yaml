# The namespace is registered on cluster A and reports its replication status as
# global with clusterA active across both clusters. The CLI-level proof that the
# metadata actually replicated to cluster B lives in chainsaw-test.yaml.
apiVersion: temporal.bmor10.com/v1alpha1
kind: TemporalNamespace
metadata:
  name: orders
status:
  registered: true
  (conditions[?type == 'Ready'].status | [0]): "True"
  replication:
    isGlobal: true
    activeCluster: clusterA
