# Failover: flip the namespace's active cluster to clusterB. Re-applying the same
# named TemporalNamespace with a changed activeCluster triggers the operator to
# execute the Temporal failover. All other fields are unchanged.
apiVersion: temporal.bmor10.com/v1alpha1
kind: TemporalNamespace
metadata:
  name: orders
spec:
  clusterRef:
    name: temporal-cluster-a
  retentionPeriod: "24h"
  description: "Global orders namespace for multi-cluster e2e"
  ownerEmail: "team@example.com"
  isGlobal: true
  clusters: [clusterA, clusterB]
  activeCluster: clusterB
