# CloudNativePG (CNPG) Postgres cluster used as the Temporal datastore.
#
# Prerequisite: the CNPG operator must be installed in the cluster, e.g.:
#   kubectl apply --server-side -f \
#     https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.24/releases/cnpg-1.24.0.yaml
#
# CNPG provisions a Secret named "<cluster>-app" containing the application
# user's credentials (keys: username, password), referenced by the
# TemporalCluster below.
#
# The "temporal" login role and its password are created by initdb and stored in
# the generated "<cluster>-app" Secret. Do NOT redeclare "temporal" under
# spec.managed.roles without a passwordSecret: CNPG would reconcile the role to
# PASSWORD NULL / NOLOGIN, breaking password authentication for both the
# create-visibility-db Job and the operator.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-pg
spec:
  instances: 1
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
