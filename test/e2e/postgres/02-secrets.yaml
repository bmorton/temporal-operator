# The visibility database lives in the same Postgres instance. CNPG only creates
# the bootstrap database, so create the visibility database via a one-shot Job
# that connects with the CNPG-generated superuser credentials.
#
# The application credentials Secret (temporal-pg-app) is generated by CNPG and
# already contains a "password" key, which the TemporalCluster references
# directly; no additional Secret is required here.
apiVersion: batch/v1
kind: Job
metadata:
  name: create-visibility-db
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: createdb
          image: postgres:16
          command: ["/bin/sh", "-c"]
          args:
            - >-
              until pg_isready -h temporal-pg-rw -U temporal; do sleep 2; done;
              psql -h temporal-pg-rw -U temporal -d temporal -tc
              "SELECT 1 FROM pg_database WHERE datname = 'temporal_visibility'"
              | grep -q 1 ||
              psql -h temporal-pg-rw -U temporal -d temporal -c
              "CREATE DATABASE temporal_visibility OWNER temporal;"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-pg-app
                  key: password
