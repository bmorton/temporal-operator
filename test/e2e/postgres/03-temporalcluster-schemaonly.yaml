# A TemporalCluster pointing at the CNPG-provided Postgres. At this milestone we
# only assert that the operator brings the schema to SchemaReady=True; Temporal
# services are not yet deployed (Ready remains False).
#
# The operator reconciler pings the datastore from its own pod in the
# temporal-system namespace, so the host must be a namespace-qualified FQDN.
# A bare "temporal-pg-rw" would resolve against temporal-system (where the
# service does not exist) and fail with PersistenceUnreachable. Chainsaw
# templating (enabled by default) substitutes the ephemeral test namespace via
# the built-in $namespace binding.
apiVersion: temporal.bmor10.com/v1alpha1
kind: TemporalCluster
metadata:
  name: temporal-schemaonly
spec:
  version: "1.31.1"
  numHistoryShards: 512
  persistence:
    defaultStore:
      sql:
        pluginName: postgres12
        host: (join('.', ['temporal-pg-rw', $namespace, 'svc.cluster.local']))
        port: 5432
        database: temporal
        user: temporal
        passwordSecretRef:
          name: temporal-pg-app
          key: password
    visibilityStore:
      sql:
        pluginName: postgres12
        host: (join('.', ['temporal-pg-rw', $namespace, 'svc.cluster.local']))
        port: 5432
        database: temporal_visibility
        user: temporal
        passwordSecretRef:
          name: temporal-pg-app
          key: password
