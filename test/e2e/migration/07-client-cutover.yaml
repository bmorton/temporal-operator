# After cutover: a newly started workflow through the proxy must run on the
# TARGET.
apiVersion: batch/v1
kind: Job
metadata:
  name: client-cutover
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: client
          image: migration-runner:e2e
          imagePullPolicy: Never
          args:
            - client
            - --address=orders-migration-proxy:7233
            - --namespace=migration
            - --workflow-id=cutover-1
            - --expect=target
            - --timeout=3m
