# goreleaser configuration for temporal-operator.
# https://goreleaser.com
version: 2

project_name: temporal-operator

# Use a dedicated output directory. The default (./dist) is already committed
# to this repo (the generated Helm chart and install manifests), so GoReleaser's
# `--clean` would delete those tracked files and abort with a dirty git state.
dist: dist-goreleaser

before:
  hooks:
    - go mod tidy

builds:
  - id: manager
    main: ./cmd
    binary: manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}

archives:
  - id: source
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

source:
  enabled: true

sboms:
  - id: archive
    artifacts: archive
  - id: source
    artifacts: source

dockers:
  - id: amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/bmorton/temporal-operator:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/bmorton/temporal-operator"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
  - id: arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/bmorton/temporal-operator:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/bmorton/temporal-operator"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

docker_manifests:
  - name_template: "ghcr.io/bmorton/temporal-operator:{{ .Version }}"
    image_templates:
      - "ghcr.io/bmorton/temporal-operator:{{ .Version }}-amd64"
      - "ghcr.io/bmorton/temporal-operator:{{ .Version }}-arm64"
  - name_template: "ghcr.io/bmorton/temporal-operator:latest"
    image_templates:
      - "ghcr.io/bmorton/temporal-operator:{{ .Version }}-amd64"
      - "ghcr.io/bmorton/temporal-operator:{{ .Version }}-arm64"

# Keyless cosign signing of checksums and images.
signs:
  - cmd: cosign
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}@${digest}"
    artifacts: manifests
    output: true

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: bmorton
    name: temporal-operator
  prerelease: auto
