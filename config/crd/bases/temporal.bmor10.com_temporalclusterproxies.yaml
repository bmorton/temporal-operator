                  local:
                    format: int64
                    type: integer
                  remote:
                    format: int64
                    type: integer
                required:
                - local
                - remote
                type: object
              image:
                description: Image overrides the pinned s2s-proxy image.
                type: string
              localClusterName:
                description: |-
                  LocalClusterName overrides the replication-group name of the local cluster.
                  Defaults to the referenced cluster's clusterMetadata.currentClusterName.
                type: string
              localClusterRef:
                description: |-
                  LocalClusterRef references the local operator-managed TemporalCluster this
                  proxy fronts. Its frontend address and issuer CA are resolved automatically.
                properties:
                  kind:
                    default: TemporalCluster
                    description: Kind selects the referenced object type.
                    enum:
                    - TemporalCluster
                    - TemporalDevServer
                    type: string
                  name:
                    description: Name is the name of the referenced object.
                    type: string
                required:
                - name
                type: object
              mux:
                description: Mux configures the s2s-proxy multiplexed transport.
                properties:
                  client:
