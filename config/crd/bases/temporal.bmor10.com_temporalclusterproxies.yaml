                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
              proxyEndpoint:
                description: ProxyEndpoint reports the exposed mux address (server
                  role) to hand to the peer.
                type: string
            type: object
        required:
        - spec
        type: object
