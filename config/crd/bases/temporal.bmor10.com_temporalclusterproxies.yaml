              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TemporalClusterProxySpec describes one local cluster's s2s-proxy and its link
              to one replication peer over an s2s-proxy mux connection.
            properties:
              acl:
                description: ACL optionally restricts the admin methods and namespaces
                  the proxy relays.
                properties:
                  allowedAdminMethods:
                    description: AllowedAdminMethods defaults to the standard replication
                      allowlist when empty.
                    items:
                      type: string
                    type: array
                  allowedNamespaces:
                    items:
