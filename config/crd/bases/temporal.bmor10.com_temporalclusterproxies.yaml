                      role=client.
                    properties:
                      serverAddress:
                        description: ServerAddress is the reachable host:port of the
                          remote mux-server.
                        type: string
                    required:
                    - serverAddress
                    type: object
                  muxCount:
                    description: MuxCount is the number of multiplexed sessions. Defaults
                      to the upstream default.
                    format: int32
                    minimum: 1
                    type: integer
                  role:
                    description: Role selects whether this proxy opens a port (server)
                      or dials out (client).
                    enum:
                    - server
                    - client
                    type: string
                  server:
                    description: Server configures the listening side. Required when
                      role=server.
                    properties:
                      exposure:
                        description: Exposure controls how the mux port is exposed
                          (ClusterIP/NodePort/LoadBalancer).
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            type: object
                          type:
                            default: ClusterIP
                            description: Service Type string describes ingress methods
                              for a service
                            enum:
                            - ClusterIP
                            - NodePort
                            - LoadBalancer
                            type: string
                        type: object
                      listenPort:
                        description: ListenPort is the port the mux listens on.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                    required:
                    - listenPort
                    type: object
                  tls:
                    description: TLS configures the mux mTLS material.
                    properties:
                      issuerRef:
                        description: IssuerRef mints this side's mux certificate.
                          Required when provider=cert-manager.
                        properties:
                          group:
                            default: cert-manager.io
                            type: string
                          kind:
                            default: Issuer
                            enum:
                            - Issuer
                            - ClusterIssuer
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      peerCARef:
                        description: |-
                          PeerCARef supplies the remote side's CA to trust. When unset the CA bundle
                          from this side's own material is used (shared-issuer case).
                        properties:
                          caKey:
                            description: CAKey is the Secret key holding the CA bundle.
                              Defaults to "ca.crt".
                            type: string
                          certKey:
                            description: CertKey is the Secret key holding the client
                              certificate. Defaults to "tls.crt".
                            type: string
                          keyKey:
                            description: KeyKey is the Secret key holding the client
                              private key. Defaults to "tls.key".
                            type: string
                          name:
                            description: Name is the Secret name.
                            type: string
                        required:
                        - name
                        type: object
                      provider:
                        default: cert-manager
                        description: Provider selects how this side's mux certificate
                          is sourced.
                        enum:
                        - cert-manager
                        - secret
                        type: string
                      secretRef:
                        description: SecretRef supplies BYO cert/key/CA. Required
                          when provider=secret.
                        properties:
                          caKey:
                            description: CAKey is the Secret key holding the CA bundle.
                              Defaults to "ca.crt".
                            type: string
                          certKey:
                            description: CertKey is the Secret key holding the client
                              certificate. Defaults to "tls.crt".
                            type: string
                          keyKey:
                            description: KeyKey is the Secret key holding the client
                              private key. Defaults to "tls.key".
                            type: string
                          name:
                            description: Name is the Secret name.
                            type: string
                        required:
                        - name
                        type: object
                    type: object
                required:
                - role
                - tls
                type: object
              peer:
                description: Peer is the remote replication cluster on the far side
                  of the mux.
                properties:
                  clusterRef:
                    description: |-
                      ClusterRef optionally references an operator-managed remote TemporalCluster.
                      It is used only to reuse the peer's issuer CA when available.
                    properties:
                      kind:
                        default: TemporalCluster
                        description: Kind selects the referenced object type.
                        enum:
                        - TemporalCluster
                        - TemporalDevServer
                        type: string
                      name:
                        description: Name is the name of the referenced object.
                        type: string
                    required:
                    - name
                    type: object
                  enableConnection:
                    default: true
                    description: EnableConnection toggles replication without deleting
                      the CR.
                    type: boolean
                  name:
                    description: Name is the remote replication cluster name (== its
                      currentClusterName).
                    type: string
                required:
                - name
                type: object
              translation:
                description: Translation optionally renames namespaces and search
                  attributes in-flight.
                properties:
                  namespaces:
                    items:
                      description: ProxyNamespaceMapping maps a local namespace name
                        to a remote one.
                      properties:
                        local:
                          type: string
                        remote:
                          type: string
                      required:
                      - local
                      - remote
                      type: object
                    type: array
                  searchAttributes:
                    items:
                      description: ProxySearchAttributeMapping maps search-attribute
                        field names for a namespace.
                      properties:
                        mappings:
                          items:
                            description: ProxyFieldMapping maps a local search-attribute
                              field name to a remote one.
                            properties:
                              localFieldName:
                                type: string
                              remoteFieldName:
                                type: string
                            required:
                            - localFieldName
                            - remoteFieldName
                            type: object
                          type: array
                        namespace:
                          type: string
                      required:
                      - mappings
                      - namespace
                      type: object
                    type: array
                type: object
            required:
            - localClusterRef
            - mux
            - peer
            type: object
          status:
            description: TemporalClusterProxyStatus is the observed state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
