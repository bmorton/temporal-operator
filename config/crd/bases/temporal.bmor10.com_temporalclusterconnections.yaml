                items:
                  description: PeerConnectionStatus reports the observed state of
                    one peer.
                  properties:
                    connected:
                      description: |-
                        Connected is true when this peer appears as an enabled remote cluster on
                        the other reachable peers.
                      type: boolean
                    message:
                      type: string
                    name:
                      type: string
                    reachable:
                      description: Reachable is true when the operator could connect
                        to this peer's frontend.
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
            type: object
