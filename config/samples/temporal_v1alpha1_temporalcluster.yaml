apiVersion: temporal.bmor10.com/v1alpha1
kind: TemporalCluster
metadata:
  labels:
    app.kubernetes.io/name: temporal-operator
    app.kubernetes.io/managed-by: kustomize
  name: temporalcluster-sample
spec:
  version: "1.31.2"
  numHistoryShards: 512
  persistence:
    defaultStore:
      sql:
        pluginName: postgres12
        host: postgres.default.svc
        port: 5432
        database: temporal
        user: temporal
        passwordSecretRef:
          name: temporal-default-store
          key: password
    visibilityStore:
      sql:
        pluginName: postgres12
        host: postgres.default.svc
        port: 5432
        database: temporal_visibility
        user: temporal
        passwordSecretRef:
          name: temporal-visibility-store
          key: password
