apiVersion: temporal.bmor10.com/v1alpha1
kind: TemporalWorkflowRun
metadata:
  name: greet-once
spec:
  clusterRef:
    name: temporal-sample
  namespace: default
  ttlSecondsAfterFinished: 300
  cancellationPolicy: Abandon
  workflow:
    workflowType: GreetingWorkflow
    taskQueue: greeting-tq
    args:
      - '"world"'
---
