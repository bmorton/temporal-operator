# This rule is not used by the project temporal-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the temporal.bmor10.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: temporal-operator
    app.kubernetes.io/managed-by: kustomize
  name: temporalsearchattribute-editor-role
rules:
- apiGroups:
  - temporal.bmor10.com
  resources:
  - temporalsearchattributes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - temporal.bmor10.com
  resources:
  - temporalsearchattributes/status
  verbs:
  - get
