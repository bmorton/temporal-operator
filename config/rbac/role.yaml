  - ingresses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - temporal.bmor10.com
  resources:
  - temporalclusterclients
  - temporalclusterconnections
  - temporalclusters
  - temporaldevservers
  - temporalnamespaces
  - temporalschedules
  - temporalsearchattributes
  - temporalworkflowruns
  verbs:
  - create
  - delete
  - get
