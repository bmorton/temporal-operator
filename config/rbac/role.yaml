  - temporalclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - temporal.bmor10.com
  resources:
  - temporalclusterclients/finalizers
  - temporalclusters/finalizers
  verbs:
  - update
- apiGroups:
  - temporal.bmor10.com
  resources:
  - temporalclusterclients/status
  - temporalclusters/status
  verbs:
  - get
  - patch
  - update
