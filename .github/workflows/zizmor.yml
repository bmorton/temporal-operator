name: GitHub Actions Security Analysis with zizmor

on:
  push:
    branches: ["main"]
    paths:
      - '.github/**'
  pull_request:
    branches: ["**"]
    paths:
      - '.github/**'

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    runs-on: namespace-profile-temporal-operator
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Code scanning / GitHub Advanced Security is not enabled on this
          # repository, so uploading SARIF results fails. Disable the upload and
          # surface findings as workflow annotations instead.
          advanced-security: false
          annotations: true
