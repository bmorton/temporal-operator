name: Release

# This workflow builds and publishes a release for an existing tag. It is
# invoked automatically by release-please.yml when a release is created, and
# can also be run manually for a given tag via workflow_dispatch.
#
# It is intentionally NOT triggered by `push: tags`, because release-please
# creates the tag with the default GITHUB_TOKEN, and GitHub does not start new
# workflow runs from events generated by GITHUB_TOKEN.
on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true
        type: string

permissions: {}

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: namespace-profile-temporal-operator
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin cosign to the v2 line. cosign v3 defaults to the new Sigstore
          # bundle format and ignores --output-signature, which breaks the
          # sign-blob args in .goreleaser.yml ("create bundle file: ... no such
          # file or directory"). Revisit when the GoReleaser signing config is
          # migrated to the bundle format.
          cosign-release: "v2.6.3"
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate provenance subjects
        id: hash
        run: |
          checksums=$(find dist-goreleaser -name 'checksums.txt' | head -1)
          echo "hashes=$(base64 -w0 < "$checksums")" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance
    needs: goreleaser
    permissions:
      actions: read
      id-token: write
      contents: write
    # The SLSA generator must be referenced by a semantic version tag, not a
    # commit SHA — digest pinning is unsupported and breaks provenance.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
      # The repository is private, but the published image and Helm chart (and
      # the image's org.opencontainers.image.source label) already disclose the
      # repo name. Allow the SLSA generator to proceed so provenance is attested;
      # the repo name appearing in the public Rekor transparency log discloses
      # nothing not already public.
      private-repository: true

  publish-chart:
    name: Publish Helm chart
    needs: goreleaser
    runs-on: namespace-profile-temporal-operator
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Package and push chart to GHCR (OCI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#v}"
          helm package dist/chart --version "$version" --app-version "$version"
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "$REGISTRY_USER" --password-stdin
          helm push "temporal-operator-${version}.tgz" oci://ghcr.io/bmorton/charts
