name: E2E

on:
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: Which suite(s) to run
        type: choice
        options: [default, devserver, mtls, upgrade, opensearch, all]
        default: default

permissions:
  contents: read

jobs:
  # Determine the test matrix: a single fast combo on PRs, the full matrix on
  # the nightly schedule.
  matrix:
    name: Compute matrix
    runs-on: namespace-profile-temporal-operator
    outputs:
      combos: ${{ steps.set.outputs.combos }}
    steps:
      - id: set
        env:
          EVENT: ${{ github.event_name }}
          SUITE: ${{ github.event.inputs.suite }}
        run: |
          postgres='{"temporal":"1.31.1","persistence":"postgres","suite":"postgres/lifecycle"}'
          devserver='{"suite":"devserver"}'
          mtls='{"temporal":"1.31.1","persistence":"mtls","suite":"mtls"}'
          upgrade='{"temporal":"1.30.0","persistence":"upgrade","suite":"upgrade"}'
          opensearch='{"temporal":"1.31.1","persistence":"opensearch","suite":"opensearch"}'
          if [ "$EVENT" = "schedule" ]; then
            echo "combos=[$postgres,$devserver,$mtls,$upgrade,$opensearch]" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            case "$SUITE" in
              devserver)  echo "combos=[$devserver]" >> "$GITHUB_OUTPUT" ;;
              mtls)       echo "combos=[$mtls]" >> "$GITHUB_OUTPUT" ;;
              upgrade)    echo "combos=[$upgrade]" >> "$GITHUB_OUTPUT" ;;
              opensearch) echo "combos=[$opensearch]" >> "$GITHUB_OUTPUT" ;;
              all)        echo "combos=[$postgres,$devserver,$mtls,$upgrade,$opensearch]" >> "$GITHUB_OUTPUT" ;;
              *)          echo "combos=[$postgres,$devserver]" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo "combos=[$postgres,$devserver]" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    name: e2e (${{ matrix.combo.suite }})
    needs: matrix
    runs-on: namespace-profile-temporal-operator
    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJSON(needs.matrix.outputs.combos) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tooling
        run: |
          make install-tools
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Create kind cluster
        run: make kind-up

      - name: Build and load operator image
        run: |
          make docker-build IMG=temporal-operator:e2e
          make kind-load IMG=temporal-operator:e2e

      - name: Install cert-manager and CloudNativePG
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
          kubectl apply --server-side -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.24/releases/cnpg-1.24.0.yaml
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=180s
          kubectl -n cnpg-system rollout status deploy/cnpg-controller-manager --timeout=180s

      - name: Install the operator via Helm
        run: |
          helm install temporal-operator dist/chart \
            --namespace temporal-system --create-namespace \
            --set manager.image.repository=temporal-operator \
            --set manager.image.tag=e2e \
            --set manager.image.pullPolicy=Never
          kubectl -n temporal-system rollout status deploy/temporal-operator-controller-manager --timeout=180s

      # Pre-pull the Temporal images on the runner and side-load them into the
      # kind node. The CNPG/cert-manager images come from quay.io/ghcr.io, but
      # the Temporal server/admin-tools images live on Docker Hub, where the
      # kind node's anonymous, unauthenticated kubelet pulls are rate-limited
      # and crash-loop the schema-setup Job with ImagePullBackOff. Loading the
      # images locally lets the default IfNotPresent pull policy find them
      # without hitting Docker Hub from inside the cluster.
      - name: Pre-pull and load Temporal images
        run: |
          set -euo pipefail
          root="test/e2e/$(echo '${{ matrix.combo.suite }}' | cut -d/ -f1)"
          # Temporal versions drive the derived server and admin-tools images.
          # Scope to the 1.x line on purpose: the fixtures also carry unrelated
          # "version:" fields (Elasticsearch 8.x, UI 2.x) that must not be
          # turned into bogus temporalio/server:<x> pulls.
          versions=$( { grep -rhoE 'version: *"?1\.[0-9]+\.[0-9]+' "$root" || true; } \
            | grep -oE '1\.[0-9]+\.[0-9]+' | sort -u || true)
          images=""
          for v in $versions; do
            if echo "${{ matrix.combo.suite }}" | grep -q "^devserver"; then
              images="$images temporalio/temporal:$v temporalio/admin-tools:$v"
            else
              images="$images temporalio/server:$v temporalio/admin-tools:$v"
            fi
          done
          # Pick up any images referenced literally in the fixtures/scripts
          # (e.g. admin-tools health checks or pinned UI images).
          images="$images $(grep -rhoE 'temporalio/[a-zA-Z0-9-]+:[^ "}]+' "$root" || true)"
          # OpenSearch (Docker Hub, rate-limited for the kind kubelet) used by
          # the opensearch suite's visibility store.
          images="$images $(grep -rhoE 'opensearchproject/[a-zA-Z0-9-]+:[^ "}]+' "$root" || true)"
          for img in $(echo "$images" | tr ' ' '\n' | sort -u); do
            [ -n "$img" ] || continue
            echo "::group::Loading $img"
            for attempt in 1 2 3; do
              if docker pull --platform linux/amd64 "$img"; then
                break
              fi
              echo "docker pull $img failed (attempt $attempt), retrying..."
              sleep $((attempt * 5))
            done
            # kind load uses ctr --all-platforms which fails on multi-arch
            # images. Import directly with ctr, omitting --all-platforms.
            docker save "$img" | docker exec -i temporal-operator-test-e2e-control-plane \
              ctr --namespace=k8s.io images import --digests --snapshotter=overlayfs -
            echo "::endgroup::"
          done

      - name: Run Chainsaw suite
        run: ./bin/chainsaw test --test-dir test/e2e/${{ matrix.combo.suite }} --config .chainsaw.yaml

      - name: Collect diagnostics
        if: failure()
        run: |
          mkdir -p artifacts
          kubectl get all -A > artifacts/all.txt || true
          kubectl get temporalcluster -A -o yaml > artifacts/temporalclusters.yaml || true
          kubectl get temporaldevserver -A -o yaml > artifacts/temporaldevservers.yaml || true
          kubectl -n temporal-system logs deploy/temporal-operator-controller-manager --tail=2000 > artifacts/operator.log || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-diagnostics-${{ strategy.job-index }}
          path: artifacts/

      - name: Tear down kind cluster
        if: always()
        run: make kind-down

  # Single required status check that aggregates the matrix result.
  e2e-result:
    name: E2E result
    if: always()
    needs: e2e
    runs-on: namespace-profile-temporal-operator
    steps:
      - name: Check matrix result
        env:
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [ "$E2E_RESULT" != "success" ]; then
            echo "e2e matrix failed"
            exit 1
          fi
          echo "e2e matrix passed"
