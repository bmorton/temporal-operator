name: Docs

on:
  push:
    branches: ["main"]
    paths: ["docs/**", "examples/**"]
  pull_request:
    branches: ["main"]
    paths: ["docs/**", "examples/**"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint docs
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            docs/**/*.md
            examples/**/*.md
            !docs/content/reference/**
            !docs/api/**
            !docs/themes/**
            !docs/superpowers/**
          config: ".markdownlint.yaml"
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 docs/**/*.md examples/**/*.md --exclude-path docs/content/reference --exclude-path docs/api --exclude-path docs/themes --exclude-path docs/superpowers
          fail: false

  build-deploy:
    name: Build and deploy site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: namespace-profile-temporal-operator
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.140.2"
          extended: true
      - name: Build site
        run: hugo --source docs --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
