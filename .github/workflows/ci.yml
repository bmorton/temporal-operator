name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Run linter
        run: make lint

  test:
    name: Test
    runs-on: namespace-profile-temporal-operator
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.x"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            bin/k8s
          key: ${{ runner.os }}-test-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-test-
      - name: Run tests
        run: make test

  build:
    name: Build image
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-build-
      - name: Build container image
        run: make docker-build IMG=temporal-operator:ci

  govulncheck:
    name: govulncheck
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
