name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Run linter
        run: make lint

  test:
    name: Test
    runs-on: namespace-profile-temporal-operator
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.x"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            bin/k8s
          key: ${{ runner.os }}-test-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-test-
      - name: Run tests
        run: make test

  build:
    name: Build image
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-build-
      - name: Build container image
        run: make docker-build IMG=temporal-operator:ci

  govulncheck:
    name: govulncheck
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  verify-chart:
    name: Verify generated chart
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-chart-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-chart-
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Regenerate Helm chart
        run: make helm-chart
      - name: Fail if generated chart is stale
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated chart/manifests are out of date (or 'make helm-chart' touched unexpected files). Run 'make helm-chart' and commit the result."
            git --no-pager status --porcelain
            git --no-pager diff
            exit 1
          fi
      - name: Fail if test-chart.yml was resurrected
        run: |
          if [ -f .github/workflows/test-chart.yml ]; then
            echo "::error::.github/workflows/test-chart.yml must not exist; helmgen should delete it."
            exit 1
          fi
      - name: Lint and render chart
        run: |
          helm lint dist/chart
          helm template temporal-operator dist/chart --namespace temporal-system >/dev/null
