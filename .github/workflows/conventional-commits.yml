name: Conventional Commits

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: namespace-profile-temporal-operator
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          # Pre-1.0: Conventional Commits are guidance, not a hard gate.
          # Report results but never fail CI on commits we don't control.
          failOnErrors: false
          failOnWarnings: false
