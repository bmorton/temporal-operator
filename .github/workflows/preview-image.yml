name: Preview Image

# Builds and pushes a one-off preview container image (and a matching
# install.yaml) for a branch or PR, so reviewers can try the operator on a
# cluster before merging. Triggered manually from the Actions tab against the
# branch you want to preview.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: pr-<short-sha>)"
        required: false
        type: string
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/amd64,linux/arm64"
        type: string

permissions: {}

jobs:
  preview:
    name: Build and push preview image
    runs-on: namespace-profile-temporal-operator
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Resolve image reference
        id: ref
        env:
          INPUT_TAG: ${{ inputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          tag="$INPUT_TAG"
          if [ -z "$tag" ]; then
            tag="pr-${SHA::7}"
          fi
          echo "image=ghcr.io/bmorton/temporal-operator:${tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.ref.outputs.image }}
          labels: |
            org.opencontainers.image.source=https://github.com/bmorton/temporal-operator
            org.opencontainers.image.revision=${{ github.sha }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # Publishing workflow: avoid restoring a potentially poisoned build
          # cache into a job that pushes artifacts (matches release.yml).
          cache: false

      - name: Generate installer pinned to the preview image
        env:
          IMG: ${{ steps.ref.outputs.image }}
        run: make build-installer IMG="$IMG"

      - name: Upload install.yaml
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: install-yaml
          path: dist/install.yaml
          if-no-files-found: error

      - name: Summary
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: |
          {
            echo "### Preview image published"
            echo
            echo '```'
            echo "$IMAGE"
            echo '```'
            echo
            echo "Download the **install-yaml** artifact from this run (CRDs + operator pinned to the image above), then:"
            echo
            echo '```sh'
            echo "kubectl apply -f install.yaml"
            echo '```'
            echo
            echo "The full installer expects cert-manager (for the validating webhook). To skip the webhook, set ENABLE_WEBHOOKS=false on the manager Deployment."
          } >> "$GITHUB_STEP_SUMMARY"
