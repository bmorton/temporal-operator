name: Preview Image

# Builds and pushes a one-off preview container image AND a matching preview
# Helm chart (pinned to that image) for a branch or PR, so reviewers can try the
# operator on a cluster (e.g. via ArgoCD) before merging. Triggered manually
# from the Actions tab against the branch you want to preview.
on:
  workflow_dispatch:
    inputs:
      baseVersion:
        description: "Base SemVer for the preview (default: latest release, minor bumped, e.g. 0.7.0)"
        required: false
        type: string
      version:
        description: "Full preview version override (must be valid SemVer; wins over baseVersion)"
        required: false
        type: string
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/amd64,linux/arm64"
        type: string

permissions: {}

jobs:
  preview:
    name: Build and push preview image
    runs-on: namespace-profile-temporal-operator
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve preview version
        id: ref
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BASE: ${{ inputs.baseVersion }}
          SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          short="${SHA::7}"

          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            base="$INPUT_BASE"
            if [ -z "$base" ]; then
              # Latest published (non-prerelease, non-draft) release tag; fall
              # back to 0.0.0 when the repo has no releases yet. The fallback is
              # outside the command substitution so a failing (e.g. 404) gh call
              # cannot leak its response body into the captured value.
              latest="$(gh api "repos/${REPO}/releases/latest" -q .tag_name 2>/dev/null)" || latest=""
              latest="${latest:-v0.0.0}"
              latest="${latest#v}"
              major="${latest%%.*}"
              rest="${latest#*.}"
              minor="${rest%%.*}"
              base="${major}.$((minor + 1)).0"
            fi
            version="${base}-pr.${short}"
          fi

          # Validate the whole value as SemVer. Use bash [[ =~ ]] on the scalar
          # (not line-based grep, which would accept a multi-line value), and
          # disallow build metadata ('+'): preview versions are prereleases and
          # '+' is not a valid OCI tag character.
          semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$'
          if [[ ! "$version" =~ $semver ]]; then
            echo "::error::Resolved version '$version' is not a valid preview SemVer (no build metadata)" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/bmorton/temporal-operator:${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved preview version: ${version}"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.ref.outputs.image }}
          labels: |
            org.opencontainers.image.source=https://github.com/bmorton/temporal-operator
            org.opencontainers.image.revision=${{ github.sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # Publishing workflow: avoid restoring a potentially poisoned build
          # cache into a job that pushes artifacts (matches release.yml).
          cache: false

      - name: Generate installer pinned to the preview image
        env:
          IMG: ${{ steps.ref.outputs.image }}
        run: make build-installer IMG="$IMG"

      - name: Upload install.yaml
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: install-yaml
          path: dist/install.yaml
          if-no-files-found: error

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Package and push preview chart to GHCR (OCI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
          VERSION: ${{ steps.ref.outputs.version }}
        run: |
          set -euo pipefail
          helm package dist/chart --version "$VERSION" --app-version "$VERSION"
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "$REGISTRY_USER" --password-stdin
          helm push "temporal-operator-${VERSION}.tgz" oci://ghcr.io/bmorton/charts

      - name: Summary
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          VERSION: ${{ steps.ref.outputs.version }}
        run: |
          {
            echo "### Preview artifacts published"
            echo
            echo "**Image**"
            echo '```'
            echo "$IMAGE"
            echo '```'
            echo
            echo "**Helm chart** (OCI)"
            echo '```'
            echo "oci://ghcr.io/bmorton/charts/temporal-operator:${VERSION}"
            echo '```'
            echo
            echo "**ArgoCD source** (set targetRevision to the preview version; flip back to your mainline version after merge):"
            echo '```yaml'
            echo "source:"
            echo "  repoURL: ghcr.io/bmorton/charts"
            echo "  chart: temporal-operator"
            echo "  targetRevision: ${VERSION}"
            echo "  helm:"
            echo "    releaseName: temporal-operator"
            echo '```'
            echo
            echo "Or with raw manifests: download the **install-yaml** artifact and \`kubectl apply -f install.yaml\`."
            echo
            echo "The chart/installer expect cert-manager (for the validating webhook). To skip the webhook, set ENABLE_WEBHOOKS=false on the manager Deployment."
          } >> "$GITHUB_STEP_SUMMARY"
