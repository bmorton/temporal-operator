name: Bug report
description: Report a problem with the temporal-operator
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Steps, custom resource YAML, and commands to reproduce.
      render: shell
    validations:
      required: true
  - type: input
    id: operator-version
    attributes:
      label: temporal-operator version
      placeholder: e.g. v0.1.0 or git SHA
    validations:
      required: true
  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes version
      placeholder: e.g. v1.33.0
    validations:
      required: true
  - type: input
    id: temporal-version
    attributes:
      label: Temporal version
      placeholder: e.g. 1.31.1
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs and/or status output
      description: Controller logs, `kubectl describe`, conditions, etc.
      render: shell
    validations:
      required: false
