baseURL = "https://temporal-operator.bmorton.dev/"
title = "temporal-operator"
languageCode = "en-us"

enableInlineShortcodes = true
enableGitInfo = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false

[menu]
  [[menu.main]]
    name = "Documentation"
    pageRef = "/docs"
    weight = 1
  [[menu.main]]
    name = "Search"
    weight = 2
    [menu.main.params]
      type = "search"
  [[menu.main]]
    name = "GitHub"
    weight = 3
    url = "https://github.com/bmorton/temporal-operator"
    [menu.main.params]
      icon = "github"

[params]
  [params.navbar]
    displayTitle = true
    displayLogo = false
  [params.theme]
    default = "system"
    displayToggle = true
  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true
  [params.editURL]
    enable = true
    base = "https://github.com/bmorton/temporal-operator/edit/main/docs/content"
  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"
      tokenize = "forward"
